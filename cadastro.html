
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cadastro - ONG</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Pular para o conteúdo</a>
  <header class="header" role="banner">
    <div class="container topbar" aria-label="Cabeçalho principal">
      <div class="brand">
        <img src="images/logo.png" alt="Logotipo da ONG" class="logo" />
        <div>
          <strong>ONG Exemplo</strong><br/><small>Conectando causas e pessoas</small>
        </div>
      </div>
      <nav class="nav" role="navigation">
        <a href="index.html" data-spa>Início</a>
        <a href="projetos.html" data-spa>Projetos</a>
        <a href="cadastro.html" data-spa>Cadastro</a>
      </nav>
      <button id="hamburger" class="hamburger" aria-label="Abrir menu">☰</button>
    </div>
    <div id="mobile-nav" class="mobile-nav container" style="display:none" aria-hidden="true">
      <a href="index.html" data-spa>Início</a>
      <a href="projetos.html" data-spa>Projetos</a>
      <a href="cadastro.html" data-spa>Cadastro</a>
    </div>
  </header>

  <main id="main" class="container" role="main" tabindex="-1">
  <!-- main-start -->
    <section aria-labelledby="cadastro-title">
      <h2 id="cadastro-title">Cadastro de Voluntário / Doador</h2>
      <div class="form-card" role="form">
        <form action="#" data-save novalidate>
          <div class="form-row">
            <div>
              <label for="nome">Nome Completo</label>
              <input id="nome" name="nome" type="text" required minlength="3" placeholder="Seu nome completo" />
            </div>
            <div>
              <label for="email">E‑mail</label>
              <input id="email" name="email" type="email" required placeholder="seu@exemplo.com" />
            </div>
          </div>

          <div class="form-row">
            <div>
              <label for="cpf">CPF</label>
              <input id="cpf" name="cpf" type="text" inputmode="numeric" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" placeholder="000.000.000-00" required />
            </div>
            <div>
              <label for="telefone">Telefone</label>
              <input id="telefone" name="telefone" type="tel" inputmode="tel" required placeholder="(00) 00000-0000" />
            </div>
          </div>

          <div class="form-row">
            <div>
              <label for="nascimento">Data de Nascimento</label>
              <input id="nascimento" name="nascimento" type="date" required />
            </div>

          </div>

          <div class="form-row full">
            <div>
              <label for="endereco">Endereço</label>
              <input id="endereco" name="endereco" type="text" required placeholder="Rua, número, complemento" />
            </div>
          </div>

          <div class="form-row">
            <div>
              <label for="cep">CEP</label>
              <input id="cep" name="cep" type="text" inputmode="numeric" pattern="\d{5}-\d{3}" placeholder="00000-000" required />
            </div>
            <div>
              <label for="cidade">Cidade</label>
              <input id="cidade" name="cidade" type="text" required />
            </div>
          </div>

          <div class="form-row">
              <div>
                <label for="estado">Estado</label>
                <select id="estado" name="estado" required>
                  <option value="">Selecione</option>
                  <option value="AC">Acre</option>
                  <option value="AL">Alagoas</option>
                  <option value="AP">Amapá</option>
                  <option value="AM">Amazonas</option>
                  <option value="BA">Bahia</option>
                  <option value="CE">Ceará</option>
                  <option value="DF">Distrito Federal</option>
                  <option value="ES">Espírito Santo</option>
                  <option value="GO">Goiás</option>
                  <option value="MA">Maranhão</option>
                  <option value="MT">Mato Grosso</option>
                  <option value="MS">Mato Grosso do Sul</option>
                  <option value="MG">Minas Gerais</option>
                  <option value="PA">Pará</option>
                  <option value="PB">Paraíba</option>
                  <option value="PR">Paraná</option>
                  <option value="PE">Pernambuco</option>
                  <option value="PI">Piauí</option>
                  <option value="RJ">Rio de Janeiro</option>
                  <option value="RN">Rio Grande do Norte</option>
                  <option value="RS">Rio Grande do Sul</option>
                  <option value="RO">Rondônia</option>
                  <option value="RR">Roraima</option>
                  <option value="SC">Santa Catarina</option>
                  <option value="SP">São Paulo</option>
                  <option value="SE">Sergipe</option>
                  <option value="TO">Tocantins</option>
                </select>
              </div>

            <div>
              <label for="perfil">Perfil</label>
              <select id="perfil" name="perfil" required>
                <option value="">Selecione</option>
                <option value="voluntario">Voluntário</option>
                <option value="doador">Doador</option>
              </select>
            </div>
          </div>

          <p><button class="btn" type="submit">Enviar cadastro</button></p>
        </form>
        <p><small>Os dados são salvos localmente (simulação) e validados nativamente.</small></p>
      </div>
    </section>
  <!-- main-end -->
  </main>

  <footer class="footer" role="contentinfo">
    <div class="container">
      <p>© ONG Exemplo — Transparência e compromisso</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
